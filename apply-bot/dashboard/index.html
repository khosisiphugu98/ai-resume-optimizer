<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Pipeline</title>
<style>
  :root {
    --bg: #0f1216; --panel: #161b22; --panel-2: #1c2430; --line: #262d38;
    --ink: #e6edf3; --dim: #8b949e; --faint: #56606d;
    --accent: #2f81f7; --ok: #3fb950; --warn: #d29922; --err: #f85149; --crit: #ff6b6b;
    --tierA: #2f81f7; --tierB: #a371f7; --tierC: #3fb950; --tierD: #d29922;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  header {
    display: flex; align-items: center; gap: 20px; padding: 12px 18px;
    background: var(--panel); border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 10;
  }
  h1 { font-size: 14px; margin: 0; font-weight: 600; letter-spacing: .2px; }
  .spacer { flex: 1; }
  .pill {
    padding: 3px 9px; border-radius: 20px; background: var(--panel-2);
    border: 1px solid var(--line); font-size: 11px; color: var(--dim);
  }
  .pill b { color: var(--ink); font-variant-numeric: tabular-nums; }
  .pill.danger { border-color: var(--err); color: var(--err); }
  #modes { display: flex; gap: 4px; }
  #modes button {
    background: var(--panel-2); color: var(--dim); border: 1px solid var(--line);
    padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; font-family: inherit;
  }
  #modes button.on { background: var(--accent); color: #fff; border-color: var(--accent); }

  main { display: grid; grid-template-columns: 1fr 420px; gap: 14px; padding: 14px; align-items: start; }

  /* Wrap rather than scroll — the Rejected column is where you catch a
     miscalibrated filter, so it must never be hidden off the right edge. */
  .board { display: flex; flex-wrap: wrap; gap: 10px; align-content: start; }
  .col {
    flex: 1 1 180px; min-width: 170px; max-width: 320px;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 8px; padding: 8px; max-height: 41vh; overflow-y: auto;
  }
  .col h2 {
    font-size: 10px; text-transform: uppercase; letter-spacing: .8px;
    color: var(--faint); margin: 2px 0 8px; display: flex; justify-content: space-between;
  }
  .card {
    background: var(--panel-2); border: 1px solid var(--line); border-left: 2px solid var(--faint);
    border-radius: 6px; padding: 8px; margin-bottom: 6px; cursor: pointer;
  }
  .card:hover { border-color: var(--accent); }
  .card .t { font-weight: 600; font-size: 12px; margin-bottom: 2px; }
  .card .c { color: var(--dim); font-size: 11px; }
  .card .m { color: var(--faint); font-size: 10px; margin-top: 4px; display: flex; gap: 6px; flex-wrap: wrap; }
  .card.tA { border-left-color: var(--tierA); } .card.tB { border-left-color: var(--tierB); }
  .card.tC { border-left-color: var(--tierC); } .card.tD { border-left-color: var(--tierD); }
  .tag { background: #0d1117; border: 1px solid var(--line); border-radius: 3px; padding: 0 4px; }

  .side { display: flex; flex-direction: column; gap: 14px; }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  .panel h3 {
    font-size: 10px; text-transform: uppercase; letter-spacing: .8px; color: var(--faint);
    margin: 0; padding: 9px 11px; border-bottom: 1px solid var(--line);
  }
  /* [hidden] must win over display:block, or the canvas shows as a black slab
     next to the "no active session" message. */
  #live { width: 100%; display: block; background: #000; aspect-ratio: 11/7; }
  #live[hidden] { display: none; }
  #liveOff { padding: 28px 12px; text-align: center; color: var(--faint); font-size: 11px; }

  #log { height: 300px; overflow-y: auto; padding: 8px 11px; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; }
  .ev { display: flex; gap: 8px; padding: 2px 0; border-bottom: 1px solid #1a1f27; }
  .ev time { color: var(--faint); flex: 0 0 52px; }
  .ev .stage { color: var(--accent); flex: 0 0 60px; }
  .ev.warn .msg { color: var(--warn); } .ev.error .msg { color: var(--err); }
  .ev.critical { background: #2d1214; } .ev.critical .msg { color: var(--crit); font-weight: 600; }

  #drawer {
    position: fixed; inset: 0 0 0 auto; width: 560px; background: var(--panel);
    border-left: 1px solid var(--line); padding: 18px; overflow-y: auto;
    transform: translateX(100%); transition: transform .18s ease; z-index: 20;
  }
  #drawer.open { transform: none; }
  #drawer h2 { font-size: 15px; margin: 0 0 2px; }
  #drawer .sub { color: var(--dim); margin-bottom: 14px; }
  #drawer dt { color: var(--faint); font-size: 10px; text-transform: uppercase; letter-spacing: .6px; margin-top: 10px; }
  #drawer dd { margin: 2px 0 0; }
  #drawer pre { background: #0d1117; border: 1px solid var(--line); border-radius: 6px; padding: 10px; white-space: pre-wrap; font-size: 11px; max-height: 320px; overflow-y: auto; }
  #close { position: absolute; top: 14px; right: 16px; background: none; border: 0; color: var(--dim); font-size: 20px; cursor: pointer; }
  a { color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>Application Pipeline</h1>
  <div id="modes">
    <button data-mode="observe">Observe</button>
    <button data-mode="review">Review</button>
    <button data-mode="auto">Auto</button>
  </div>
  <div class="spacer"></div>
  <span class="pill">Easy Apply <b id="r-easy">0</b>/<span id="c-easy">0</span></span>
  <span class="pill">External <b id="r-ext">0</b>/<span id="c-ext">0</span></span>
  <span class="pill">Email <b id="r-mail">0</b>/<span id="c-mail">0</span></span>
  <span class="pill">Views <b id="r-pv">0</b>/<span id="c-pv">0</span></span>
  <span class="pill" id="stopPill" hidden>STOPPED</span>
</header>

<main>
  <div class="board" id="board"></div>
  <div class="side">
    <div class="panel">
      <h3>Live browser</h3>
      <canvas id="live" hidden></canvas>
      <div id="liveOff">no active session</div>
    </div>
    <div class="panel">
      <h3>Event log</h3>
      <div id="log"></div>
    </div>
  </div>
</main>

<div id="drawer"><button id="close">×</button><div id="drawerBody"></div></div>
<script src="app.js"></script>
</body>
</html>
